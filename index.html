<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scout Intel Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ScoutIntel">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5358/5358640.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; background-color: #020617; }
        .chat-bubble-ai { border-radius: 20px 20px 20px 4px; }
        .chat-bubble-user { border-radius: 20px 20px 4px 20px; }
        .glass-header { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        
        table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.8rem; background: #0f172a; border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; }
        th { background: #3b82f6; color: white; padding: 10px 8px; text-align: left; font-weight: 800; text-transform: uppercase; }
        td { padding: 10px 8px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
        
        @keyframes pulse-logo {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.97); }
        }
        .thinking-logo { animation: pulse-logo 1.5s infinite ease-in-out; color: #60a5fa; }
        #chat-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-100 h-screen flex flex-col font-sans select-none overflow-hidden">

    <div id="loading-screen" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center p-8 text-center transition-opacity duration-500">
        <div class="relative w-16 h-16 mb-6">
            <div id="loading-spinner" class="absolute inset-0 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <h2 class="text-2xl font-black italic tracking-tighter text-white mb-2 uppercase">SCOUT<span class="text-blue-500">INTEL</span></h2>
        <p id="load-status" class="text-[10px] text-slate-500 font-mono uppercase mb-4">Syncing Database...</p>
        <div class="w-full max-w-xs bg-slate-900 rounded-full h-1 overflow-hidden">
            <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <header class="glass-header sticky top-0 z-40 p-4 pt-14 border-b border-slate-800 flex justify-between items-center">
        <div>
            <h1 id="logo" class="text-xl font-black italic tracking-tighter text-white uppercase">SCOUT<span class="text-blue-500">INTEL</span></h1>
            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">v2.0 Performance Mode</p>
        </div>
        <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-800 border border-slate-700"></div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 pb-28">
        <div class="text-center opacity-30 py-4">
            <span class="text-[9px] uppercase font-bold tracking-[0.3em]">Direct Local Analysis Active</span>
        </div>
    </main>

    <div id="chart-wrapper" class="hidden fixed bottom-24 left-4 right-4 bg-slate-900/98 border border-slate-700 p-4 rounded-3xl shadow-2xl backdrop-blur-xl z-30">
        <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] font-black text-blue-500 uppercase">Visual Breakdown</span>
            <button onclick="document.getElementById('chart-wrapper').classList.add('hidden')" class="w-6 h-6 flex items-center justify-center bg-slate-800 rounded-full text-xs">✕</button>
        </div>
        <div class="h-40"><canvas id="scoutChart"></canvas></div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 pb-10 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent z-40">
        <div class="max-w-2xl mx-auto flex gap-2 bg-slate-900 border border-slate-800 p-2 rounded-2xl shadow-2xl">
            <input type="text" id="userInput" class="flex-1 bg-transparent px-4 py-2 text-sm focus:outline-none text-white" placeholder="Type a name or ask for top players...">
            <button onclick="askAI()" class="bg-blue-600 p-2 px-6 rounded-xl text-white font-black text-xs active:scale-90 transition-all uppercase">RUN</button>
        </div>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const modelId = "Llama-3.2-1B-Instruct-q4f16_1-MLC";
        let engine;
        let myChart = null;
        const logo = document.getElementById("logo");

        async function init() {
            try {
                engine = await webllm.CreateMLCEngine(modelId, {
                    initProgressCallback: (report) => {
                        const p = Math.round(report.progress * 100);
                        document.getElementById("progress-bar").style.width = p + "%";
                        document.getElementById("load-status").innerText = `Syncing: ${p}%`;
                        if (p === 100) {
                            setTimeout(() => {
                                document.getElementById("loading-screen").style.opacity = '0';
                                setTimeout(() => document.getElementById("loading-screen").remove(), 500);
                                document.getElementById("status-dot").className = "w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";
                            }, 800);
                        }
                    }
                });
            } catch (e) { document.getElementById("load-status").innerText = "WebGPU Error"; }
        }

        window.askAI = async () => {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            input.value = "";
            logo.classList.add("thinking-logo");

            const chat = document.getElementById("chat-container");
            chat.innerHTML += `<div class="flex justify-end"><div class="chat-bubble-user bg-blue-600 p-3 px-5 max-w-[85%] text-sm font-medium shadow-lg">${text}</div></div>`;
            
            const aiWrapper = document.createElement("div");
            aiWrapper.className = "flex flex-col items-start";
            const aiBubble = document.createElement("div");
            aiBubble.className = "chat-bubble-ai bg-slate-900 border border-slate-800 p-4 max-w-[95%] text-sm text-slate-200 shadow-xl";
            aiBubble.innerHTML = `<div class="flex gap-1"><div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce"></div><div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce [animation-delay:0.2s]"></div><div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-bounce [animation-delay:0.4s]"></div></div>`;
            
            aiWrapper.appendChild(aiBubble);
            chat.appendChild(aiWrapper);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('./data.json');
                const scoutingData = await res.json();
                const lowerText = text.toLowerCase();

                // 1. SMART GREETING CHECK
                if (lowerText.length < 5 && (lowerText.includes("hi") || lowerText.includes("hello"))) {
                    aiBubble.innerHTML = "Hello. System is online and ready for scouting analysis. Who are we looking at today?";
                } else {
                    // 2. DATA FILTERING
                    let subset = [];
                    if (lowerText.match(/top|best|leader|highest/)) {
                        subset = [...scoutingData].sort((a,b) => (b.points || 0) - (a.points || 0)).slice(0, 8);
                    } else {
                        subset = scoutingData.filter(p => {
                            const words = lowerText.split(' ');
                            return words.some(w => w.length > 2 && p.name.toLowerCase().includes(w));
                        });
                    }
                    if (subset.length === 0) subset = scoutingData.slice(0, 3);

                    // 3. AI COMPLETION
                    const reply = await engine.chat.completions.create({
                        messages: [
                            { role: "system", content: "You are a pro scout assistant. If greeting, be brief. If asked about players, use markdown tables. No asterisks. No fluff." },
                            { role: "user", content: `DATA: ${JSON.stringify(subset)}\n\nUSER: ${text}` }
                        ]
                    });
                    aiBubble.innerHTML = marked.parse(reply.choices[0].message.content.replace(/\*/g, ""));
                }

                if (lowerText.match(/graph|chart|visual/)) renderGraph(scoutingData, lowerText);

            } catch (err) { aiBubble.innerText = "Error processing query."; }

            logo.classList.remove("thinking-logo");
            chat.scrollTop = chat.scrollHeight;
        };

        function renderGraph(data, query) {
            document.getElementById("chart-wrapper").classList.remove("hidden");
            const ctx = document.getElementById('scoutChart').getContext('2d');
            if (myChart) myChart.destroy();
            let key = query.includes("rebound") ? "rebounds" : "points";
            const top = [...data].sort((a,b) => (b[key]||0)-(a[key]||0)).slice(0, 6);
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top.map(p => p.name.split(' ')[0]),
                    datasets: [{ label: key.toUpperCase(), data: top.map(p => p[key]), backgroundColor: '#3b82f6', borderRadius: 6 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { ticks: { color: '#64748b', font: { size: 10 } } } } }
            });
        }

        document.getElementById("userInput").addEventListener("keypress", e => { if (e.key === "Enter") window.askAI(); });
        init();
    </script>
</body>
</html>
