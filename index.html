<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Scout Intel Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ScoutIntel">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5358/5358640.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        .chat-bubble-ai { border-radius: 18px 18px 18px 4px; }
        .chat-bubble-user { border-radius: 18px 18px 4px 18px; }
        
        .glass-header { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
        
        /* Mobile-First Tables */
        table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.8rem; background: #0f172a; border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; }
        th { background: #3b82f6; color: white; padding: 10px 8px; text-align: left; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 10px 8px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
        tr:last-child td { border-bottom: none; }
        
        @keyframes pulse-logo {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }
        .thinking-logo { animation: pulse-logo 1.5s infinite ease-in-out; color: #60a5fa; }
        
        #chat-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen flex flex-col font-sans select-none overflow-hidden">

    <div id="loading-screen" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center p-8 text-center transition-opacity duration-500">
        <div class="relative w-16 h-16 mb-6">
            <div class="absolute inset-0 border-4 border-blue-500/10 rounded-full"></div>
            <div id="loading-spinner" class="absolute inset-0 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <h2 class="text-2xl font-black italic tracking-tighter text-white mb-2 uppercase">SCOUT<span class="text-blue-500">INTEL</span></h2>
        <p id="load-status" class="text-[10px] text-slate-500 font-mono tracking-widest uppercase mb-4">Warming up WebGPU...</p>
        <div class="w-full max-w-xs bg-slate-900 rounded-full h-1 overflow-hidden">
            <div id="progress-bar" class="bg-blue-500 h-full transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <header class="glass-header sticky top-0 z-40 p-4 pt-14 border-b border-slate-800 flex justify-between items-center">
        <div>
            <h1 id="logo" class="text-xl font-black italic tracking-tighter text-white uppercase">SCOUT<span class="text-blue-500">INTEL</span></h1>
            <p class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">2026 Season Analysis</p>
        </div>
        <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-800 border border-slate-700 transition-all duration-500"></div>
    </header>

    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-6 pb-28">
        <div class="text-center opacity-40 py-4">
            <span class="text-[10px] uppercase font-bold tracking-[0.3em]">Encrypted Local Session</span>
        </div>
    </main>

    <div id="chart-wrapper" class="hidden fixed bottom-24 left-4 right-4 bg-slate-900/98 border border-slate-700 p-4 rounded-3xl shadow-2xl backdrop-blur-xl z-30">
        <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Statistical Projection</span>
            <button onclick="document.getElementById('chart-wrapper').classList.add('hidden')" class="w-6 h-6 flex items-center justify-center bg-slate-800 rounded-full text-xs">✕</button>
        </div>
        <div class="h-40">
            <canvas id="scoutChart"></canvas>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 pb-8 bg-gradient-to-t from-slate-950 via-slate-950 to-transparent z-40">
        <div class="max-w-2xl mx-auto flex gap-2 bg-slate-900/90 border border-slate-800 p-2 rounded-2xl shadow-2xl backdrop-blur-md">
            <input type="text" id="userInput" 
                class="flex-1 bg-transparent px-4 py-2 text-sm focus:outline-none placeholder:text-slate-600 text-white" 
                placeholder="Compare players, find leaders...">
            <button onclick="askAI()" id="sendBtn" class="bg-blue-600 hover:bg-blue-500 p-2 px-6 rounded-xl text-white font-black text-xs active:scale-90 transition-all uppercase tracking-tighter">
                RUN
            </button>
        </div>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        // RESTORED TO LLAMA 1B FOR STABILITY
        const modelId = "Llama-3.2-1B-Instruct-q4f16_1-MLC";
        let engine;
        let myChart = null;
        const logo = document.getElementById("logo");

        async function init() {
            try {
                engine = await webllm.CreateMLCEngine(modelId, {
                    initProgressCallback: (report) => {
                        const p = Math.round(report.progress * 100);
                        document.getElementById("progress-bar").style.width = p + "%";
                        document.getElementById("load-status").innerText = `Downloading Intelligence: ${p}%`;
                        
                        if (p === 100) {
                            setTimeout(() => {
                                document.getElementById("loading-screen").style.opacity = '0';
                                setTimeout(() => document.getElementById("loading-screen").remove(), 500);
                                const dot = document.getElementById("status-dot");
                                dot.className = "w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.8)] border-none";
                            }, 1000);
                        }
                    }
                });
            } catch (e) {
                document.getElementById("load-status").innerText = "WebGPU Failed. Use Chrome/Safari.";
                console.error(e);
            }
        }

        window.askAI = async () => {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            if (!text) return;

            input.value = "";
            logo.classList.add("thinking-logo");

            const chat = document.getElementById("chat-container");
            chat.innerHTML += `<div class="flex justify-end"><div class="chat-bubble-user bg-blue-600 p-3 px-5 max-w-[85%] text-sm font-medium shadow-lg shadow-blue-900/20">${text}</div></div>`;
            
            const aiWrapper = document.createElement("div");
            aiWrapper.className = "flex flex-col items-start space-y-1";
            const aiBubble = document.createElement("div");
            aiBubble.className = "chat-bubble-ai bg-slate-900 border border-slate-800 p-4 max-w-[95%] text-sm text-slate-200 shadow-xl";
            aiBubble.innerHTML = `<div class="flex gap-1.5"><div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:0.2s]"></div><div class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:0.4s]"></div></div>`;
            
            aiWrapper.appendChild(aiBubble);
            chat.appendChild(aiWrapper);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('./data.json');
                const scoutingData = await res.json();
                const lowerText = text.toLowerCase();

                // Advanced Filtering Logic
                let subset = [];
                if (lowerText.match(/top|best|leader|highest/)) {
                    subset = [...scoutingData].sort((a,b) => (b.points || 0) - (a.points || 0)).slice(0, 10);
                } else {
                    subset = scoutingData.filter(p => {
                        const search = p.name.toLowerCase() + " " + p.pos.toLowerCase();
                        const words = lowerText.split(' ');
                        return words.some(word => word.length > 2 && search.includes(word));
                    });
                }
                if (subset.length === 0) subset = scoutingData.slice(0, 5);

                const reply = await engine.chat.completions.create({
                    messages: [
                        { role: "system", content: "You are a clinical basketball scout. Respond only with facts. Use markdown tables for all player lists. No asterisks. Be concise." },
                        { role: "user", content: `DATA: ${JSON.stringify(subset)}\n\nPROMPT: ${text}` }
                    ],
                    temperature: 0.0
                });

                aiBubble.innerHTML = marked.parse(reply.choices[0].message.content.replace(/\*/g, ""));

                if (lowerText.match(/graph|chart|visual/)) renderGraph(scoutingData, lowerText);

            } catch (err) {
                aiBubble.innerText = "System error. Please refresh.";
            }

            logo.classList.remove("thinking-logo");
            chat.scrollTop = chat.scrollHeight;
        };

        function renderGraph(data, query) {
            document.getElementById("chart-wrapper").classList.remove("hidden");
            const ctx = document.getElementById('scoutChart').getContext('2d');
            if (myChart) myChart.destroy();

            let key = "points"; let label = "Points Per Game";
            if (query.includes("rebound")) { key = "rebounds"; label = "Rebounds"; }
            if (query.includes("assist")) { key = "assists"; label = "Assists"; }
            
            const top = [...data].sort((a,b) => (b[key] || 0) - (a[key] || 0)).slice(0, 6);

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top.map(p => p.name.split(' ')[0]),
                    datasets: [{ label, data: top.map(p => p[key]), backgroundColor: '#3b82f6', borderRadius: 8, barThickness: 25 }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { display: false, grid: { display: false } }, 
                        x: { grid: { display: false }, ticks: { color: '#475569', font: { size: 10, weight: 'bold' } } } 
                    } 
                }
            });
        }

        document.getElementById("userInput").addEventListener("keypress", e => { if (e.key === "Enter") window.askAI(); });
        init();
    </script>
</body>
</html>
